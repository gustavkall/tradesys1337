name: Auto-update project memory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 2

      - name: Update project memory
        run: |
          # Loop protection
          MSG=$(git log -1 --pretty=format:'%s')
          if echo "$MSG" | grep -q "^docs: auto-update"; then
            echo "Skipping — triggered by auto-update commit"
            exit 0
          fi

          FILES=$(git log --name-only -1 --pretty=format:'')
          TODAY=$(date -u +%Y-%m-%d)
          HASH=$(git log -1 --pretty=format:'%h')
          CHANGED=false

          # Log scripts/workflows changes to decisions.md
          for FILE in $FILES; do
            case "$FILE" in
              scripts/*|.github/workflows/*)
                BASENAME=$(basename "$FILE")
                printf '\n### DEC-AUTO-%s — %s tillagd/ändrad\n**Datum:** %s\n**Beslut:** Automatiskt loggad förändring\n**Påverkan:** %s committat till main\n' \
                  "$TODAY" "$BASENAME" "$TODAY" "$FILE" >> project_memory/decisions.md
                CHANGED=true
                ;;
            esac
          done

          # Log index.html changes to decisions.md
          if echo "$FILES" | grep -q "^index.html$"; then
            printf '\n### CHANGELOG-%s — index.html\n**Datum:** %s\n**Commit:** %s\n**Ändring:** %s\n' \
              "$TODAY" "$TODAY" "$HASH" "$MSG" >> project_memory/decisions.md
            CHANGED=true
          fi

          if [ "$CHANGED" = "false" ]; then
            echo "No relevant files changed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add project_memory/decisions.md
          git commit -m "docs: auto-update project_memory $TODAY"
          git push
