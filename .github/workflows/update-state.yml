name: Update market state

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 21:30 UTC (22:30 CET) Mon-Fri
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-state:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch market data and update state
        run: node scripts/fetch-state.js
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          ALPHA_VANTAGE: ${{ secrets.ALPHA_VANTAGE }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet state/current_state.md && exit 0
          git add state/current_state.md
          git commit -m "state: auto-update marknadsregim $(date -u +%Y-%m-%d)"
          git push
